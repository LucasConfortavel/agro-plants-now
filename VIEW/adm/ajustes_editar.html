<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="../../PUBLIC/css/ajustes.css">
</head>
<body>
    <div class="jp_hamburger-menu">
        <div class="jp_hamburger-line"></div>
        <div class="jp_hamburger-line"></div>
        <div class="jp_hamburger-line"></div>
    </div>


    <div class="jp_container">
        <!-- Sidebar -->
        <aside class="jp_sidebar">
            <div class="jp_logo">
                <img src="../../PUBLIC/img/logo_agro.png" alt="Logo">
            </div>
            <nav>
                <ul>
                    <li class="jp_active"><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/grid.svg" alt=""> Dashboard</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/box.svg" alt=""> Catálogo</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/users.svg" alt=""> Clientes</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/user.svg" alt=""> Vendedores</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/shopping-cart.svg" alt=""> Vendas</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/file-text.svg" alt=""> Relatórios</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/tag.svg" alt=""> Cupons</li>
                </ul>
            </nav>
            <div class="jp_bottom-menu">
                <ul>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/settings.svg" alt=""> Ajustes</li>
                    <li><img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/log-out.svg" alt=""> Sair</li>
                </ul>
            </div>
        </aside>


        
        <!-- Main Content -->
        <main class="jp_main-content">
            <header class="jp_profile-header">
                <div class="jp_profile-info">
                    <img src="https://raw.githubusercontent.com/feathericons/feather/master/icons/user.svg" alt="Profile" class="jp_profile-pic">
                    <div class="profile-text">
                        <h2>José Farmer</h2>
                        <p>JoseFarmer_Reidoagro@gmail.com</p>
                    </div>
                </div>
                <div class="jp_role">Administrador</div>
            </header>

            <div class="jp_content">
                <nav class="jp_tabs">
                    <button class="jp_tab jp_active">Informações</button>
                    <button class="jp_tab">Segurança</button>
                </nav>

                <div class="jp_info-section">
                    <div class="jp_section-header">
                        <h3>Informações pessoais</h3>
                    </div>

                    <form class="jp_edit-form" onsubmit="redirectToHome(event)">
                        <div class="jp_info-grid">
                            <div class="jp_info-item">
                                <label>Nome</label>
                                <input type="text" value="José Farmer" disabled class="jp_form-input disabled">
                            </div>
                            <div class="jp_info-item">
                                <label>Idade</label>
                                <input type="text" value="39" disabled class="jp_form-input disabled">
                            </div>
                            <div class="jp_info-item">
                                <label>Data de nascimento</label>
                                <input type="text" value="10/09/2007" disabled class="jp_form-input disabled">
                            </div>
                            <div class="jp_info-item">
                                <label>E-mail</label>
                                <input type="email" placeholder="Digite seu e-mail" class="jp_form-input">
                            </div>
                            <div class="jp_info-item">
                                <label>Número de telefone</label>
                                <input type="tel" placeholder="Digite seu telefone" class="jp_form-input">
                            </div>
                            <div class="jp_info-item">
                                <label>Posição</label>
                                <input type="text" value="Administrador" disabled class="jp_form-input disabled">
                            </div>
                            <div class="jp_info-item">
                                <label>CPF</label>
                                <input type="text" value="345.367.234-14" disabled class="jp_form-input disabled">
                            </div>
                        </div>
                        <div class="jp_form-actions">
                            <button type="submit" class="jp_btn-update">Atualizar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script>
    function redirectToHome(event) {
        event.preventDefault();
        window.location.href = 'informaçoes_adm.html'
    }
    </script>

    <div class="jp_overlay"></div>
    <script src="../../PUBLIC/JS/script.js"></script>
</body>
</html>
